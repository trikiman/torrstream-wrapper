[pytest]
markers =
    smoke: fast unit/contract checks. Flask test client, no network. CI default.
    integration: hits the live wrapper (read-only). Skipped if TORRSTREAM_BASE not set.
    e2e: full end-to-end including mutations. Opt-in via -m e2e.
    cors: Cross-origin and CORS preflight checks.

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -ra --strict-markers -m "not e2e"
