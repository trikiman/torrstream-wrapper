<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TorrStream</title>
<meta name="description" content="Personal streaming with cross-device sync">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TorrStream">
<link rel="icon" href="static/icons/icon-512.png" type="image/png">
<link rel="apple-touch-icon" href="static/icons/icon-512.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e50914">
<link rel="stylesheet" href="/static/vidstack/css/theme.css">
<link rel="stylesheet" href="/static/vidstack/css/video.css">
<script type="module" src="/static/vidstack/vidstack.js"></script>
<style>
/* Prevent Vidstack FOUC until web components upgrade */
media-player:not(:defined),
media-provider:not(:defined),
media-video-layout:not(:defined) { display: block; background: #000; min-height: 200px; }

:root {
  --bg: #0d0d0d;
  --bg2: #1a1a1a;
  --bg3: #262626;
  --bg4: #333;
  --text: #f0f0f0;
  --text2: #888;
  --text3: #555;
  --accent: #e50914;
  --accent2: #b81d24;
  --accent-glow: rgba(229,9,20,0.25);
  --green: #2ecc71;
  --green2: #27ae60;
  --card-w: 175px;
  --radius: 10px;
  --radius-lg: 14px;
  --transition: 0.25s cubic-bezier(.4,0,.2,1);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
/*
 * Theme switching: drives off `html[data-theme="light"]` so the variable
 * redefinition happens at root level. The body's background-color is also
 * set directly from JS in applyTheme() — Chrome's style recomputation
 * through the rule cascade takes ~680ms on this DOM (vidstack web components
 * + shadow trees) regardless of CSS transition approach. A direct inline
 * style write paints in the next frame (~16ms), giving instant feedback.
 * Other elements (nav, cards) follow the cascade on the same paint cycle.
 */
:root[data-theme="light"], .light {
  --bg: #f5f5f5;
  --bg2: #ffffff;
  --bg3: #e8e8e8;
  --bg4: #d0d0d0;
  --text: #111;
  --text2: #666;
  --text3: #999;
  --accent-glow: rgba(229,9,20,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background-color: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  min-height: 100dvh;
  /* Drop transition entirely — style recomputation latency on this DOM
     (~680ms) dwarfs any animation, and applyTheme() now sets backgroundColor
     directly from JS (paints in next frame ~16ms). */
  -webkit-font-smoothing: antialiased;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ═══ NAV ═══ */
nav {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  background: linear-gradient(180deg, rgba(13,13,13,0.95) 0%, rgba(13,13,13,0.7) 70%, transparent 100%);
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 14px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
:root[data-theme="light"] nav, .light nav { background: linear-gradient(180deg, rgba(245,245,245,0.95) 0%, rgba(245,245,245,0.7) 70%, transparent 100%); }
.logo {
  font-size: 20px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.5px;
  flex-shrink: 0;
  text-shadow: 0 0 20px var(--accent-glow);
}
.search-wrap { flex: 1; max-width: 460px; position: relative; }
.search-wrap input {
  width: 100%;
  padding: 10px 16px 10px 40px;
  border-radius: 22px;
  border: 1px solid transparent;
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: all var(--transition);
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.search-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 15px; pointer-events: none; }
.nav-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.install-btn {
  background: var(--green);
  border: none;
  color: white;
  padding: 8px 14px;
  border-radius: 22px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: all var(--transition);
  display: none;
}
.install-btn:hover { background: var(--green2); transform: scale(1.04); }
.nav-btn {
  background: var(--bg3);
  border: none;
  color: var(--text);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.nav-btn:hover { background: var(--accent); color: white; transform: scale(1.1); }
.add-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px 16px;
  border-radius: 22px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: all var(--transition);
  letter-spacing: 0.3px;
}
.add-btn:hover { background: var(--accent2); transform: scale(1.05); box-shadow: 0 4px 16px var(--accent-glow); }

/* ═══ MAIN ═══ */
main { padding: 0 20px 80px; }
.section { margin-top: 28px; }
.section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.2px;
}
.section-title .count { font-size: 12px; color: var(--text2); font-weight: 400; background: var(--bg3); padding: 2px 8px; border-radius: 10px; }

/* ═══ GRID ═══ */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr));
  gap: 14px;
}

/* ═══ CARD ═══ */
.card {
  background: var(--bg2);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  position: relative;
}
.card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 16px 40px rgba(0,0,0,0.6); }
.card:active { transform: scale(0.97); }
.card-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--bg3); }
.card-poster-placeholder {
  width: 100%;
  aspect-ratio: 2/3;
  background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
}
.card-info { padding: 10px 12px; }
.card-title { font-size: 13px; font-weight: 600; line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { font-size: 11px; color: var(--text2); margin-top: 4px; }
.card-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
.card-delete {
  background: transparent;
  border: 1px solid var(--bg4);
  color: var(--text2);
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
}
.card-delete:hover { background: rgba(229,9,20,0.12); border-color: var(--accent); color: var(--accent); }
.progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }
.card-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--accent);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 7px;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}
.card-episode-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,0.75);
  color: white;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 6px;
  backdrop-filter: blur(4px);
}

/* ═══ SEARCH RESULTS ═══ */
.search-results { display: none; }
.search-results.active { display: block; }

/* ═══ RECENT SEARCHES ═══ */
.recent-searches { display: none; }
.recent-searches.active { display: block; }
.recent-searches .section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.recent-clear {
  font-size: 12px;
  color: var(--text2);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.recent-clear:hover { color: var(--text); background: var(--bg3); }
.recent-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.recent-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg2);
  border: 1px solid var(--bg3);
  border-radius: 18px;
  font-size: 13px;
  color: var(--text);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}
.recent-chip:hover { background: var(--bg3); border-color: var(--accent); }
.recent-chip .icon { font-size: 12px; opacity: 0.6; }
.result-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px;
  background: var(--bg2);
  border-radius: var(--radius);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
}
.result-item:hover { background: var(--bg3); border-color: var(--bg4); }
.result-info { flex: 1; min-width: 0; }
.result-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.result-meta { font-size: 12px; color: var(--text2); margin-top: 4px; }
.result-add {
  background: var(--accent);
  border: none;
  color: white;
  padding: 7px 16px;
  border-radius: 16px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  transition: all var(--transition);
  flex-shrink: 0;
}
.result-add:hover { background: var(--accent2); transform: scale(1.05); }
.result-add.added { background: var(--green); }

/* ═══ EPISODE PANEL ═══ */
.episode-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 500;
  flex-direction: column;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.episode-overlay.active { display: flex; }
.episode-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--bg3);
  position: sticky;
  top: 0;
  z-index: 10;
}
.episode-back {
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 8px;
  transition: all var(--transition);
}
.episode-back:hover { background: var(--bg3); }
.episode-title { font-size: 17px; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.episode-continue-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 700;
  transition: all var(--transition);
  white-space: nowrap;
}
.episode-continue-btn:hover { background: var(--accent2); transform: scale(1.05); }
.episode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
  padding: 16px 20px;
}
.ep-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--bg2);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
  position: relative;
}
.ep-card:hover { background: var(--bg3); border-color: var(--bg4); transform: translateX(4px); }
.ep-card.playing { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.ep-card.watched { opacity: 0.6; }
.ep-num {
  width: 36px;
  height: 36px;
  background: var(--bg3);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--text2);
}
.ep-card.watched .ep-num { background: var(--green); color: white; }
.ep-card.playing .ep-num { background: var(--accent); color: white; }
.ep-info { flex: 1; min-width: 0; }
.ep-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ep-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
.ep-progress { height: 3px; background: var(--bg3); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.ep-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.ep-actions { display: flex; gap: 6px; flex-shrink: 0; }
.ep-action-btn {
  background: var(--bg3);
  border: none;
  color: var(--text2);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.ep-action-btn:hover { background: var(--accent); color: white; }
.ep-download-btn { font-size: 16px; }

/* ═══ PLAYER OVERLAY ═══ */
.player-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
.player-overlay.active { display: flex; }
.player-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 10;
  transition: opacity 0.3s;
}
.player-back {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  font-size: 20px;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 8px;
  transition: all var(--transition);
}
.player-back:hover { background: rgba(255,255,255,0.2); }
.player-title { font-size: 15px; font-weight: 600; color: white; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-ep-info { font-size: 12px; color: rgba(255,255,255,0.6); padding: 0 8px; }
.player-next-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 6px 14px;
  border-radius: 16px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
  transition: all var(--transition);
  white-space: nowrap;
}
.player-next-btn:hover { background: var(--accent2); }
.player-download-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
.player-download-btn:hover { background: var(--accent); border-color: var(--accent); }
.video-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
.video-wrap media-player { width: 100%; height: 100%; max-height: 100dvh; }
.video-wrap video { max-width: 100%; max-height: 100vh; max-height: 100dvh; width: 100%; }

/* ═══ MODAL ═══ */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(6px); }
.modal-overlay.active { display: flex; }
.modal { background: var(--bg2); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 440px; border: 1px solid var(--bg3); box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
.modal h3 { font-size: 18px; margin-bottom: 16px; font-weight: 700; }
.modal input {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--bg3);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
  transition: all var(--transition);
}
.modal input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.modal-btns button { padding: 10px 22px; border-radius: var(--radius); border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all var(--transition); }
.btn-cancel { background: var(--bg3); color: var(--text); }
.btn-cancel:hover { background: var(--bg4); }
.btn-ok { background: var(--accent); color: white; }
.btn-ok:hover { background: var(--accent2); }

/* ═══ EMPTY ═══ */
.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty .icon { font-size: 44px; margin-bottom: 12px; opacity: 0.6; }
.empty div:last-child { font-size: 13px; margin-top: 8px; color: var(--text3); }
.empty-action {
  margin-top: 16px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform var(--transition), background var(--transition);
}
.empty-action:hover { background: var(--accent2); transform: translateY(-1px); }

/* ═══ LOADING ═══ */
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--bg3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══ TOAST ═══ */
.toast {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg2);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  z-index: 9999;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  border: 1px solid var(--bg3);
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
  :root { --card-w: 130px; }
  nav { padding: 10px 14px; gap: 10px; }
  main { padding: 0 12px 80px; }
  .add-btn span { display: none; }
  .episode-grid { grid-template-columns: 1fr; padding: 12px; }
}
</style>
</head>
<body>

<nav>
  <div class="logo">🎬 TorrStream</div>
  <div class="search-wrap">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Поиск фильмов и сериалов..." autocomplete="off">
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="toggleTheme()" id="themeBtn" title="Тема">☀️</button>
    <button class="install-btn" id="installBtn" onclick="handleInstallClick()">Установить</button>
    <button class="add-btn" onclick="openAddModal()">+ <span>Magnet</span></button>
  </div>
</nav>

<main>
  <!-- Recent searches (server-synced) -->
  <div class="section recent-searches" id="recentSearches">
    <div class="section-title">
      <span>🕘 Недавние запросы</span>
      <button class="recent-clear" id="recentClearBtn" onclick="clearRecentSearches()">Очистить</button>
    </div>
    <div class="recent-chips" id="recentChips"></div>
  </div>

  <!-- Search results -->
  <div class="section search-results" id="searchResults">
    <div class="section-title">Результаты поиска <span class="count" id="searchCount"></span></div>
    <div id="searchList"></div>
  </div>

  <!-- Continue watching -->
  <div class="section" id="continueSection" style="display:none">
    <div class="section-title">▶️ Продолжить просмотр</div>
    <div class="grid" id="continueGrid"></div>
  </div>

  <!-- All torrents -->
  <div class="section">
    <div class="section-title">📁 Все торренты <span class="spinner" id="loadingSpinner"></span></div>
    <div class="grid" id="allGrid"></div>
    <div class="empty" id="emptyState" style="display:none">
      <div class="icon" id="emptyIcon">🎞️</div>
      <div id="emptyTitle">Нет добавленных торрентов</div>
      <div id="emptyText">Добавьте через Lampa или вставьте magnet-ссылку</div>
      <button class="empty-action" id="emptyAction" onclick="loadTorrents()" style="display:none">Повторить</button>
    </div>
  </div>
</main>

<!-- Episode Panel -->
<div class="episode-overlay" id="episodeOverlay">
  <div class="episode-header">
    <button class="episode-back" onclick="closeEpisodes()">←</button>
    <div class="episode-title" id="episodeTitle"></div>
    <button class="episode-continue-btn" id="episodeContinueBtn" onclick="continueEpisode()">▶ Продолжить</button>
  </div>
  <div class="episode-grid" id="episodeGrid"></div>
</div>

<!-- Player -->
<div class="player-overlay" id="playerOverlay">
  <div class="player-header" id="playerHeader">
    <button class="player-back" onclick="closePlayer()">←</button>
    <div class="player-title" id="playerTitle"></div>
    <span class="player-ep-info" id="playerEpInfo"></span>
    <button class="player-next-btn" id="playerNextBtn" onclick="playNextEpisode()" style="display:none">Далее →</button>
    <button class="player-download-btn" id="playerDownloadBtn" onclick="downloadCurrentFile()" title="Скачать" style="display:none">⬇</button>
  </div>
  <div class="video-wrap">
    <media-player id="mediaPlayer" playsinline crossorigin aria-label="TorrStream video player">
      <media-provider></media-provider>
      <media-video-layout></media-video-layout>
    </media-player>
  </div>
</div>

<!-- Add magnet modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Добавить торрент</h3>
    <input type="text" id="magnetInput" placeholder="magnet:?xt=urn:btih:... или хеш">
    <input type="text" id="titleInput" placeholder="Название (необязательно)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeAddModal()">Отмена</button>
      <button class="btn-ok" onclick="addTorrent()">Добавить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "";
let currentHash = null;
let currentTorrent = null;
let currentFiles = [];
let currentFileIndex = 1;
let saveTimer = null;
let searchTimer = null;
let allTorrents = [];
let lastStatus = null;
let deferredInstallPrompt = null;

function normalizeTorrentResponse(data) {
  if (Array.isArray(data)) {
    return {
      ok: true,
      items: data,
      diagnostics: {
        ok: true,
        torrent_count: data.length,
        state: data.length === 0 ? "empty" : "ready",
        error: "",
      },
    };
  }
  return {
    ok: data?.ok !== false,
    items: data?.items || [],
    diagnostics: data?.diagnostics || null,
    error: data?.error || "",
  };
}

// ═══ PWA Service Worker ═══
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

// ═══ Theme ═══
// Stored on the html element via `data-theme` so CSS variable redefinition
// happens at the cascade root. Body background-color is also set directly
// inline so the user sees instant feedback (Chrome's full style recompute
// through the cascade can take >600ms on a DOM with vidstack web components;
// a direct inline style write paints in the next frame).
const savedTheme = localStorage.getItem("theme") || "dark";
const THEME_BG = { light: "#f5f5f5", dark: "#0d0d0d" };
function applyTheme(name) {
  document.documentElement.setAttribute("data-theme", name);
  if (name === "light") document.body.classList.add("light");
  else document.body.classList.remove("light");
  // Snap body bg directly — bypasses style cascade recomputation latency.
  document.body.style.backgroundColor = THEME_BG[name] || THEME_BG.dark;
  document.getElementById("themeBtn").textContent = name === "light" ? "🌙" : "☀️";
}
applyTheme(savedTheme);

function toggleTheme() {
  const next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
  applyTheme(next);
  localStorage.setItem("theme", next);
}

// ═══ Toast ═══
function showToast(msg, duration = 2500) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), duration);
}

// ═══ Helpers ═══
function fmtSize(bytes) {
  if (!bytes) return "";
  const gb = bytes / 1073741824;
  return gb >= 1 ? gb.toFixed(1) + " ГБ" : (bytes / 1048576).toFixed(0) + " МБ";
}

function fmtTime(sec) {
  if (!sec) return "";
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  return h > 0 ? `${h}ч ${m}м` : `${m}м`;
}

function cleanTitle(title) {
  return (title || "").replace(/^\[LAMPA\]\s*/i, "").trim() || "Без названия";
}

function cacheSearchResults(query, results) {
  try {
    localStorage.setItem(`search-cache:${query.toLowerCase()}`, JSON.stringify(results));
  } catch (e) {}
}

function getCachedSearchResults(query) {
  try {
    const raw = localStorage.getItem(`search-cache:${query.toLowerCase()}`);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function librarySearchMatches(query) {
  const normalized = (query || "").toLowerCase();
  if (!normalized) return [];
  return allTorrents.filter(t => cleanTitle(t.title).toLowerCase().includes(normalized));
}

function getFilename(path) {
  return (path || "").split("/").pop().split("\\").pop();
}

function isIOS() {
  const ua = navigator.userAgent || "";
  return /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

function downloadFile(hash, path, index) {
  // Build a download URL pointing at the wrapper's stream endpoint. The browser
  // will save with the filename in the URL because of the `download` attribute.
  // iOS Safari ignores `download` on cross-origin anchors → show a fallback toast.
  const fname = getFilename(path) || `file-${index}`;
  const downloadUrl = `${API}/api/stream/${encodeURIComponent(fname)}?hash=${hash}&index=${index}`;
  if (isIOS()) {
    // On iOS, opening the URL in the same tab triggers Safari's QuickTime playback,
    // not a download. Best UX: open in a new tab + tell the user how to save.
    window.open(downloadUrl, "_blank");
    showToast("iOS: Поделиться → Сохранить в Файлы", 4000);
    return;
  }
  const a = document.createElement("a");
  a.href = downloadUrl;
  a.download = fname;
  a.rel = "noopener";
  // Some browsers require the anchor to be in DOM for download to work.
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast(`Скачивание: ${fname}`);
}

function downloadCurrentFile() {
  // Called from the player header download button.
  if (!currentHash || !currentFiles.length) {
    showToast("Файл не выбран");
    return;
  }
  const f = currentFiles.find(x => (x.id || 0) === currentFileIndex) || currentFiles[0];
  if (!f) return;
  downloadFile(currentHash, f.path, f.id || currentFileIndex || 1);
}

function isVideoFile(path) {
  const ext = (path || "").split(".").pop().toLowerCase();
  return ["mp4","mkv","avi","m4v","mov","wmv","ts","webm"].includes(ext);
}

// ═══ Load Torrents ═══
async function loadTorrents() {
  try {
    const r = await fetch(`${API}/api/torrents`);
    const data = normalizeTorrentResponse(await r.json());
    allTorrents = data.items;
    lastStatus = data.diagnostics || (allTorrents.length === 0 ? await fetchStatus() : null);
    document.getElementById("loadingSpinner").style.display = "none";
    renderAll();
  } catch(e) {
    lastStatus = await fetchStatus();
    document.getElementById("loadingSpinner").style.display = "none";
    renderAll();
    showToast("Ошибка загрузки");
  }
}

async function fetchStatus() {
  try {
    const r = await fetch(`${API}/api/status`);
    if (!r.ok) return null;
    return await r.json();
  } catch (e) {
    return null;
  }
}

function renderAll() {
  const continuing = allTorrents.filter(t => {
    const inProgress = t.position > 30 && t.duration > 0 && (t.position / t.duration) < 0.95;
    // Show torrents watched in Lampa (TorrServer-side viewed flag) even when the
    // wrapper hasn't recorded a position locally.
    const watchedExternally = t.viewed_in_torrserver && !(t.duration > 0 && (t.position / t.duration) >= 0.95);
    return inProgress || watchedExternally;
  });
  const continueSection = document.getElementById("continueSection");
  const continueGrid = document.getElementById("continueGrid");

  if (continuing.length > 0) {
    continueSection.style.display = "block";
    continueGrid.innerHTML = continuing.map(t => cardHTML(t, true)).join("");
  } else {
    continueSection.style.display = "none";
  }

  const allGrid = document.getElementById("allGrid");
  const emptyState = document.getElementById("emptyState");
  const emptyIcon = document.getElementById("emptyIcon");
  const emptyTitle = document.getElementById("emptyTitle");
  const emptyText = document.getElementById("emptyText");
  const emptyAction = document.getElementById("emptyAction");
  if (allTorrents.length === 0) {
    allGrid.innerHTML = "";
    emptyState.style.display = "block";
    emptyAction.style.display = "none";
    if (lastStatus?.torrserver?.ok === false) {
      emptyIcon.textContent = "⚠️";
      emptyTitle.textContent = "Нет подключения к TorrServer";
      emptyText.textContent = lastStatus?.torrserver?.error
        ? `Проверьте TorrServer (${lastStatus.torrserver.url}): ${lastStatus.torrserver.error}`
        : "Проверьте настройки подключения и повторите попытку.";
      emptyAction.style.display = "inline-flex";
    } else if (lastStatus?.torrserver?.ok === true) {
      emptyIcon.textContent = "🎞️";
      emptyTitle.textContent = "Библиотека пока пуста";
      emptyText.textContent = "TorrServer доступен, но сейчас в библиотеке нет торрентов. Добавьте magnet-ссылку или используйте поиск.";
    } else {
      emptyIcon.textContent = "🎞️";
      emptyTitle.textContent = "Нет добавленных торрентов";
      emptyText.textContent = "Добавьте через Lampa или вставьте magnet-ссылку";
    }
  } else {
    emptyState.style.display = "none";
    allGrid.innerHTML = allTorrents.map(t => cardHTML(t, false)).join("");
  }
}

function cardHTML(t, showProgress) {
  const title = cleanTitle(t.title);
  const safeTitle = title.replace(/'/g, "\\'");
  const pct = t.duration > 0 ? Math.round((t.position / t.duration) * 100) : 0;
  const poster = t.poster
    ? `<img class="card-poster" src="${t.poster}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy"><div class="card-poster-placeholder" style="display:none">🎬</div>`
    : `<div class="card-poster-placeholder">🎬</div>`;
  const badge = t.stat === 3 ? '<div class="card-badge">▶</div>' : '';
  const epBadge = t.last_file_index > 1 ? `<div class="card-episode-badge">EP ${t.last_file_index}</div>` : '';
  const progress = (showProgress && pct > 0) ? `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>` : "";
  const meta = [fmtSize(t.torrent_size), pct > 0 ? `${pct}%` : ""].filter(Boolean).join(" · ");

  return `<div class="card" onclick="openTorrent('${t.hash}')">
    ${badge}${epBadge}${poster}
    <div class="card-info">
      <div class="card-title">${title}</div>
      <div class="card-meta">${meta}</div>
      ${progress}
      <div class="card-actions">
        <button class="card-delete" onclick="event.stopPropagation();confirmRemoveTorrent('${t.hash}', '${safeTitle}')">Удалить</button>
      </div>
    </div>
  </div>`;
}

function searchResultHTML(item, key, options = {}) {
  const title = item.Title || item.title || "Без названия";
  const tracker = item.Tracker || item.tracker || options.badge || "";
  const size = fmtSize(item.Size || item.torrent_size);
  const seeds = item.Seeders || 0;
  const meta = [tracker, size, seeds > 0 ? `${seeds} сидов` : ""].filter(Boolean).join(" · ");
  const magnet = (item.MagnetUri || "").replace(/'/g, "\\'");
  const safeTitle = title.replace(/'/g, "\\'");

  if (options.localHash) {
    return `<div class="result-item" onclick="openTorrent('${options.localHash}')">
      <div class="result-info">
        <div class="result-title">${title}</div>
        <div class="result-meta">${meta || "Уже в библиотеке"}</div>
      </div>
      <button class="result-add" onclick="event.stopPropagation();openTorrent('${options.localHash}')">Открыть</button>
    </div>`;
  }

  return `<div class="result-item">
    <div class="result-info">
      <div class="result-title">${title}</div>
      <div class="result-meta">${meta}</div>
    </div>
    <button class="result-add" id="btn-${key}" onclick="addFromSearch('${key}', '${magnet}', '${safeTitle}')">
      + Добавить
    </button>
  </div>`;
}

function showEpisodeMessage(title, icon, message, subtext = "") {
  document.getElementById("episodeTitle").textContent = title;
  document.getElementById("episodeContinueBtn").style.display = "none";
  document.getElementById("episodeGrid").innerHTML = `
    <div class="empty" style="grid-column:1 / -1">
      <div class="icon">${icon}</div>
      <div>${message}</div>
      ${subtext ? `<div>${subtext}</div>` : ""}
    </div>
  `;
  document.getElementById("episodeOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function showPlayerError(message, details = "") {
  document.getElementById("playerTitle").textContent = cleanTitle(currentTorrent?.title);
  document.getElementById("playerEpInfo").textContent = "";
  document.getElementById("playerNextBtn").style.display = "none";
  document.querySelector(".video-wrap").innerHTML = `
    <div class="empty" style="padding:40px 24px;">
      <div class="icon">⚠️</div>
      <div>${message}</div>
      ${details ? `<div>${details}</div>` : ""}
    </div>
  `;
  document.getElementById("playerOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function ensurePlayerElement() {
  // Vidstack: <media-player id="mediaPlayer"> creates its own <video> inside <media-provider>.
  // We expose that underlying <video> so existing event handlers (onloadedmetadata, onpause,
  // onerror, onended) and the Lampa plugin's findVideo() both work.
  let mp = document.getElementById("mediaPlayer");
  if (!mp) {
    // If the .video-wrap was blown away (closePlayer rebuilds it), restore the Vidstack tree.
    document.querySelector(".video-wrap").innerHTML = `
      <media-player id="mediaPlayer" playsinline crossorigin aria-label="TorrStream video player">
        <media-provider></media-provider>
        <media-video-layout></media-video-layout>
      </media-player>
    `;
    mp = document.getElementById("mediaPlayer");
  }
  // Vidstack inserts its own <video> inside <media-provider>. Find it (may not exist yet
  // before first source assignment; caller sets mediaPlayer.src then awaits metadata).
  const vid = mp.querySelector("video");
  return vid;
}

// ═══ Open Torrent → Episode Panel or Direct Play ═══
async function openTorrent(hash) {
  currentHash = hash;
  currentTorrent = allTorrents.find(t => t.hash === hash);

  try {
    const r = await fetch(`${API}/api/files/${hash}`);
    const data = await r.json();
    currentFiles = data.file_stats || [];
    const lastIdx = data.last_file_index || 0;

    if (data.ok === false) {
      showEpisodeMessage(
        cleanTitle(currentTorrent?.title),
        "⚠️",
        "Не удалось загрузить файлы торрента",
        data.error || "Проверьте подключение к TorrServer и повторите попытку."
      );
      return;
    }

    if (!data.diagnostics?.has_playable_files) {
      showEpisodeMessage(
        cleanTitle(currentTorrent?.title),
        "📼",
        "Нет доступных видеофайлов",
        data.diagnostics?.total_file_count
          ? "Торрент загружен, но в нем нет файлов, которые можно воспроизвести прямо сейчас."
          : "TorrServer не вернул данные о файлах для этого торрента."
      );
      return;
    }

    if (currentFiles.length > 1) {
      // Series — show episode panel
      showEpisodePanel(hash, currentFiles, lastIdx, data.viewed_indices || []);
    } else {
      // Single file — play directly
      const f = currentFiles[0];
      playFile(hash, f.path, f.id || 1);
      document.getElementById("playerTitle").textContent = cleanTitle(currentTorrent?.title);
      document.getElementById("playerEpInfo").textContent = "";
      document.getElementById("playerNextBtn").style.display = "none";
      document.getElementById("playerDownloadBtn").style.display = "inline-flex";
      document.getElementById("playerOverlay").classList.add("active");
      document.body.style.overflow = "hidden";
    }
  } catch(e) {
    showEpisodeMessage(
      cleanTitle(currentTorrent?.title),
      "⚠️",
      "Ошибка загрузки файлов",
      "Не удалось получить данные о файлах. Повторите попытку позже."
    );
  }
}

// ═══ Episode Panel ═══
function showEpisodePanel(hash, files, lastIdx, viewedIndices) {
  const overlay = document.getElementById("episodeOverlay");
  document.getElementById("episodeTitle").textContent = cleanTitle(currentTorrent?.title);

  const viewed = new Set(viewedIndices);
  const grid = document.getElementById("episodeGrid");

  grid.innerHTML = files.map((f, i) => {
    const idx = f.id || (i + 1);
    const name = getFilename(f.path);
    const size = fmtSize(f.length);
    const pos = f.position || 0;
    const dur = f.file_duration || 0;
    const pct = dur > 0 ? Math.round((pos / dur) * 100) : 0;
    const isWatched = f.viewed || viewed.has(idx);
    const isPlaying = idx === lastIdx;

    const cls = [
      "ep-card",
      isWatched ? "watched" : "",
      isPlaying ? "playing" : "",
    ].filter(Boolean).join(" ");

    const progressBar = pct > 0 && pct < 100
      ? `<div class="ep-progress"><div class="ep-progress-fill" style="width:${pct}%"></div></div>`
      : "";

    const metaParts = [size, pct > 0 ? `${pct}%` : "", isWatched ? "✓ просмотрено" : ""].filter(Boolean).join(" · ");

    return `<div class="${cls}" onclick="playEpisode(${idx})">
      <div class="ep-num">${isWatched ? "✓" : idx}</div>
      <div class="ep-info">
        <div class="ep-name">${name}</div>
        <div class="ep-meta">${metaParts}</div>
        ${progressBar}
      </div>
      <div class="ep-actions">
        <button class="ep-action-btn" onclick="event.stopPropagation();playEpisode(${idx})" title="Играть">▶</button>
        <button class="ep-action-btn ep-download-btn" onclick="event.stopPropagation();downloadFile('${hash}', '${(f.path || '').replace(/'/g, "\\'")}', ${idx})" title="Скачать">⬇</button>
      </div>
    </div>`;
  }).join("");

  // Set continue button logic
  const continueBtn = document.getElementById("episodeContinueBtn");
  const nextUnwatched = files.find(f => !f.viewed && !viewed.has(f.id || 0));
  if (lastIdx > 0) {
    continueBtn.textContent = `▶ Продолжить (EP ${lastIdx})`;
    continueBtn.style.display = "inline-flex";
    continueBtn.dataset.index = lastIdx;
  } else if (nextUnwatched) {
    continueBtn.textContent = `▶ Начать (EP ${nextUnwatched.id || 1})`;
    continueBtn.style.display = "inline-flex";
    continueBtn.dataset.index = nextUnwatched.id || 1;
  } else {
    continueBtn.style.display = "none";
  }

  overlay.classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeEpisodes() {
  document.getElementById("episodeOverlay").classList.remove("active");
  document.body.style.overflow = "";
}

function continueEpisode() {
  const idx = parseInt(document.getElementById("episodeContinueBtn").dataset.index) || 1;
  playEpisode(idx);
}

function playEpisode(idx) {
  currentFileIndex = idx;
  const f = currentFiles.find(f => (f.id || 0) === idx) || currentFiles[idx - 1];
  if (!f) {
    showEpisodeMessage(
      cleanTitle(currentTorrent?.title),
      "📼",
      "Не найден файл для воспроизведения",
      "Обновите список файлов и повторите попытку."
    );
    return;
  }
  const filename = f.path;

  document.getElementById("playerTitle").textContent = cleanTitle(currentTorrent?.title);
  document.getElementById("playerEpInfo").textContent = `EP ${idx} / ${currentFiles.length}`;

  // Show "next" button if not the last episode
  const nextBtn = document.getElementById("playerNextBtn");
  const currentIdx = currentFiles.findIndex(file => (file.id || 0) === idx);
  nextBtn.style.display = currentIdx < currentFiles.length - 1 ? "inline-flex" : "none";

  // Always show download for the currently-playing file
  document.getElementById("playerDownloadBtn").style.display = "inline-flex";

  playFile(currentHash, filename, idx);
  document.getElementById("playerOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function playNextEpisode() {
  const currentIdx = currentFiles.findIndex(f => (f.id || 0) === currentFileIndex);
  if (currentIdx < currentFiles.length - 1) {
    const next = currentFiles[currentIdx + 1];
    playEpisode(next.id || (currentIdx + 2));
  }
}

// ═══ Play File ═══
async function playFile(hash, filename, index) {
  const fname = getFilename(filename);
  const streamUrl = `${API}/api/stream/${encodeURIComponent(fname)}?hash=${hash}&index=${index}`;
  const probeUrl = `${streamUrl}&probe=1`;

  try {
    const probeResp = await fetch(probeUrl);
    const probe = await probeResp.json();
    if (!probe.ok) {
      showPlayerError("Поток недоступен", probe.error || "Проверьте источник и повторите попытку.");
      return;
    }
  } catch (e) {
    showPlayerError("Не удалось проверить поток", "Повторите попытку через несколько секунд.");
    return;
  }

  // Open the player overlay FIRST so the <media-player> is visible/attached when Vidstack
  // upgrades its custom elements. Without this, Vidstack sometimes delays <video> insertion
  // until the player becomes visible, which races the wait loop below.
  document.getElementById("playerOverlay").classList.add("active");
  document.body.style.overflow = "hidden";

  // Vidstack: set source on <media-player>. TorrServer file containers include .mkv which
  // Vidstack would otherwise route to an HLS provider; force the plain HTML5 video provider
  // by declaring the source with an explicit generic video type. Chrome decodes MKV+H.264
  // natively via canPlayType().
  ensurePlayerElement(); // makes sure <media-player> exists
  const mediaPlayer = document.getElementById("mediaPlayer");
  mediaPlayer.src = { src: streamUrl, type: "video/mp4" };

  let video = null;
  for (let tries = 0; tries < 30; tries++) {
    await new Promise(r => setTimeout(r, 100));
    video = mediaPlayer.querySelector("video");
    if (video) break;
  }
  if (!video) {
    showPlayerError("Ошибка плеера", "Vidstack не инициализировался за 3с. Обновите страницу.");
    return;
  }

  // Wait for Vidstack to actually assign a src to the <video> element. On some
  // sources (.mkv files, slow CDN fetches of provider chunks) the dynamic import
  // for the video provider can stall, leaving Vidstack in canLoad state but with
  // no source on the inner <video>. Detect that and recover by directly setting
  // the src — Chrome can play MKV+H.264 natively via the bare HTML5 element.
  let vidstackSourceAssigned = false;
  for (let tries = 0; tries < 50; tries++) {
    await new Promise(r => setTimeout(r, 100));
    if (video.currentSrc || video.src) {
      vidstackSourceAssigned = true;
      break;
    }
  }
  if (!vidstackSourceAssigned) {
    console.warn("[player] Vidstack didn't assign src after 5s — falling back to direct <video> src");
    try {
      video.src = streamUrl;
      video.crossOrigin = "anonymous";
      video.playsInline = true;
      video.load();
    } catch (e) {
      showPlayerError("Плеер не смог загрузить источник", "Попробуйте обновить страницу или другой файл.");
      return;
    }
  }

  // Restore saved position + autoplay.
  //
  // Bug fixed in v2.2.1 (2026-05-15): assigning `video.onloadedmetadata` AFTER
  // Vidstack has already loaded metadata (which is the common case once the
  // probe + waitForVidstackSrc loops finish — readyState=4 by then) means the
  // handler waits for an event that already fired. Result: no seek, no play.
  // User sees a paused player at currentTime=0 with the saved position lost.
  //
  // Fix: always read pos first, then either run the seek+play immediately if
  // metadata is already loaded, or attach a one-shot addEventListener
  // (instead of clobbering onloadedmetadata) to handle the not-yet-loaded case.
  let pos = null;
  try {
    const posResp = await fetch(`${API}/api/position/${hash}?file_index=${index}`);
    pos = await posResp.json();
  } catch (e) { /* fall through with null */ }

  const doResumeAndPlay = () => {
    if (pos && pos.ok !== false && pos.position > 10) {
      try {
        video.currentTime = pos.position;
        showToast(`С ${fmtTime(pos.position)}`);
      } catch (e) {
        console.warn("[player] seek failed:", e);
      }
    }
    // play() may reject due to autoplay policy; we ignore — user can press play.
    video.play().catch((e) => console.debug("[player] autoplay blocked:", e?.name));
  };

  if (video.readyState >= 1 /* HAVE_METADATA */) {
    // Metadata was already loaded by Vidstack before this code ran — fire now.
    doResumeAndPlay();
  } else {
    video.addEventListener("loadedmetadata", doResumeAndPlay, { once: true });
  }

  // Save position every 5s
  if (saveTimer) clearInterval(saveTimer);
  saveTimer = setInterval(() => {
    if (!video.paused && video.currentTime > 5) {
      savePos(hash, index, video.currentTime, video.duration);
    }
  }, 5000);

  video.onpause = () => {
    if (video.currentTime > 5) savePos(hash, index, video.currentTime, video.duration);
  };

  video.onerror = async () => {
    try {
      const probeResp = await fetch(probeUrl);
      const probe = await probeResp.json();
      showPlayerError("Ошибка воспроизведения", probe.error || "Поток прерван или недоступен.");
    } catch (e) {
      showPlayerError("Ошибка воспроизведения", "Поток прерван или недоступен.");
    }
  };

  // Auto-next when episode ends
  video.onended = async () => {
    const result = await savePos(hash, index, video.duration, video.duration);
    if (result?.viewed_sync_attempted && !result?.viewed_synced) {
      showToast("Серия завершена, но синхронизация статуса не удалась");
    } else {
      showToast("Серия завершена ✓");
    }
    // Auto-play next after 3s
    const currentIdx = currentFiles.findIndex(f => (f.id || 0) === index);
    if (currentFiles.length > 1 && currentIdx < currentFiles.length - 1) {
      setTimeout(() => playNextEpisode(), 3000);
    }
  };
}

async function savePos(hash, index, currentTime, duration) {
  try {
    const r = await fetch(`${API}/api/position/${hash}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        position: Math.floor(currentTime),
        duration: Math.floor(duration || 0),
        file_index: index,
      }),
    });
    return await r.json();
  } catch (e) {
    showToast("Ошибка сохранения позиции");
    return { ok: false, error: "save failed" };
  }
}

function closePlayer() {
  const mp = document.getElementById("mediaPlayer");
  const video = mp ? mp.querySelector("video") : null;
  if (saveTimer) clearInterval(saveTimer);
  if (video && video.currentTime > 5) {
    savePos(currentHash, currentFileIndex, video.currentTime, video.duration);
  }
  if (video) {
    try { video.pause(); } catch(e) {}
  }
  if (mp) {
    try { mp.src = ""; } catch(e) {}
  }
  document.getElementById("playerOverlay").classList.remove("active");
  document.getElementById("playerDownloadBtn").style.display = "none";
  document.querySelector(".video-wrap").innerHTML = `
    <media-player id="mediaPlayer" playsinline crossorigin aria-label="TorrStream video player">
      <media-provider></media-provider>
      <media-video-layout></media-video-layout>
    </media-player>
  `;
  document.body.style.overflow = "";

  // If episode panel was open, refresh it
  if (document.getElementById("episodeOverlay").classList.contains("active")) {
    openTorrent(currentHash);
  } else {
    loadTorrents();
  }
}

// ═══ Search ═══
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", () => {
  clearTimeout(searchTimer);
  const q = searchInput.value.trim();
  if (q.length < 2) {
    document.getElementById("searchResults").classList.remove("active");
    if (q.length === 0) showRecentSearches();
    return;
  }
  document.getElementById("recentSearches").classList.remove("active");
  searchTimer = setTimeout(() => doSearch(q), 500);
});
searchInput.addEventListener("focus", () => {
  if (searchInput.value.trim().length === 0) showRecentSearches();
});

// ═══ Recent searches (server-synced across devices) ═══
async function loadRecentSearches() {
  try {
    const r = await fetch(`${API}/api/recent-searches`);
    const data = await r.json();
    return Array.isArray(data.queries) ? data.queries : [];
  } catch (e) {
    return [];
  }
}

async function showRecentSearches() {
  const panel = document.getElementById("recentSearches");
  const chips = document.getElementById("recentChips");
  const queries = await loadRecentSearches();
  // After the async fetch, re-check that the user hasn't started typing —
  // otherwise we'd re-show the recent panel on top of live search results.
  if (searchInput.value.trim().length > 0) {
    panel.classList.remove("active");
    return;
  }
  if (queries.length === 0) {
    panel.classList.remove("active");
    return;
  }
  // Build chips via DOM API so user-supplied query strings cannot break out
  // of an attribute or be interpreted as code (XSS-safe by construction).
  chips.replaceChildren();
  for (const item of queries) {
    const q = (item && typeof item.q === "string") ? item.q : "";
    if (!q) continue;
    const chip = document.createElement("span");
    chip.className = "recent-chip";
    chip.addEventListener("click", () => pickRecentSearch(q));
    const icon = document.createElement("span");
    icon.className = "icon";
    icon.textContent = "🔍";
    chip.appendChild(icon);
    chip.appendChild(document.createTextNode(q));
    chips.appendChild(chip);
  }
  panel.classList.add("active");
}

function pickRecentSearch(q) {
  searchInput.value = q;
  searchInput.focus();
  document.getElementById("recentSearches").classList.remove("active");
  doSearch(q);
}

async function recordRecentSearch(q) {
  try {
    await fetch(`${API}/api/recent-searches`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ q }),
    });
  } catch (e) {}
}

async function clearRecentSearches() {
  try {
    await fetch(`${API}/api/recent-searches`, { method: "DELETE" });
  } catch (e) {}
  document.getElementById("recentChips").innerHTML = "";
  document.getElementById("recentSearches").classList.remove("active");
}

async function doSearch(q) {
  const resultsDiv = document.getElementById("searchResults");
  const listDiv = document.getElementById("searchList");
  const countEl = document.getElementById("searchCount");
  resultsDiv.classList.add("active");
  listDiv.innerHTML = '<div style="padding:24px;text-align:center"><div class="spinner"></div></div>';
  countEl.textContent = "";

  try {
    const r = await fetch(`${API}/api/search?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    const results = data.Results || [];
    countEl.textContent = results.length;

    if (data.ok === false) {
      const cached = getCachedSearchResults(q);
      const localMatches = librarySearchMatches(q);
      const blocks = [];

      blocks.push('<div class="empty"><div class="icon">⚠️</div><div>Сервис поиска недоступен</div><div>Проверьте jacred или повторите попытку позже</div><button class="empty-action" onclick="doSearch(searchInput.value.trim())">Повторить</button></div>');

      if (cached.length > 0) {
        blocks.push(`<div class="section-title" style="margin-top:18px">Сохраненные результаты <span class="count">${cached.length}</span></div>`);
        blocks.push(cached.slice(0, 20).map((item, i) => searchResultHTML(item, `cached-${i}`, { badge: "кэш" })).join(""));
      }

      if (localMatches.length > 0) {
        blocks.push(`<div class="section-title" style="margin-top:18px">Совпадения в библиотеке <span class="count">${localMatches.length}</span></div>`);
        blocks.push(localMatches.slice(0, 20).map((item, i) => searchResultHTML(item, `local-${i}`, { localHash: item.hash, badge: "библиотека" })).join(""));
      }

      listDiv.innerHTML = blocks.join("");
      return;
    }

    if (results.length === 0) {
      listDiv.innerHTML = '<div class="empty"><div class="icon">🔍</div><div>Ничего не найдено</div></div>';
      return;
    }

    cacheSearchResults(q, results);
    recordRecentSearch(q);
    listDiv.innerHTML = results.slice(0, 30).map((item, i) => searchResultHTML(item, i)).join("");
  } catch(e) {
    listDiv.innerHTML = '<div class="empty"><div class="icon">⚠️</div><div>Ошибка поиска</div></div>';
  }
}

async function addFromSearch(i, magnet, title) {
  const btn = document.getElementById(`btn-${i}`);
  btn.textContent = "...";
  btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/add`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ link: magnet, title }),
    });
    const d = await r.json();
    if (d.ok) {
      btn.textContent = "✓ Добавлен";
      btn.classList.add("added");
      showToast("Торрент добавлен!");
      loadTorrents();
    } else {
      btn.textContent = "Ошибка";
      btn.disabled = false;
      showToast(d.error || "Ошибка добавления");
    }
  } catch(e) {
    btn.textContent = "Ошибка";
    btn.disabled = false;
    showToast("Ошибка соединения");
  }
}

// ═══ Add magnet ═══
function openAddModal() {
  document.getElementById("addModal").classList.add("active");
  document.getElementById("magnetInput").focus();
}
function closeAddModal() {
  document.getElementById("addModal").classList.remove("active");
  document.getElementById("magnetInput").value = "";
  document.getElementById("titleInput").value = "";
}
async function addTorrent() {
  const link = document.getElementById("magnetInput").value.trim();
  const title = document.getElementById("titleInput").value.trim();
  if (!link) { showToast("Введите magnet-ссылку или хеш"); return; }
  try {
    const r = await fetch(`${API}/api/add`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ link, title }),
    });
    const d = await r.json();
    if (d.ok) { showToast("Торрент добавлен!"); closeAddModal(); loadTorrents(); }
    else showToast(d.error || "Ошибка добавления");
  } catch(e) { showToast("Ошибка соединения"); }
}

async function confirmRemoveTorrent(hash, title) {
  const confirmed = window.confirm(`Удалить торрент "${title}"?`);
  if (!confirmed) return;

  try {
    const r = await fetch(`${API}/api/remove/${hash}`, { method: "DELETE" });
    const d = await r.json();
    if (d.ok) {
      showToast(d.removed_positions ? "Торрент и позиция удалены" : "Торрент удален");
      loadTorrents();
      return;
    }
    showToast(d.error || "Ошибка удаления");
  } catch (e) {
    showToast("Ошибка соединения");
  }
}

function updateInstallButton() {
  const btn = document.getElementById("installBtn");
  const ua = navigator.userAgent || "";
  const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;

  if (isStandalone) {
    btn.style.display = "none";
    return;
  }

  if (deferredInstallPrompt || isIOS) {
    btn.style.display = "inline-flex";
  } else {
    btn.style.display = "none";
  }
}

async function handleInstallClick() {
  const ua = navigator.userAgent || "";
  const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

  if (deferredInstallPrompt) {
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice.catch(() => null);
    deferredInstallPrompt = null;
    updateInstallButton();
    return;
  }

  if (isIOS) {
    showToast("Safari: Поделиться → На экран «Домой»");
    return;
  }

  showToast("Установка недоступна в этом браузере");
}

// ═══ Event Listeners ═══
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")
      && !e.target.closest("#searchResults")
      && !e.target.closest("#recentSearches")) {
    document.getElementById("searchResults").classList.remove("active");
    document.getElementById("recentSearches").classList.remove("active");
    searchInput.value = "";
  }
});

document.getElementById("addModal").addEventListener("click", (e) => {
  if (e.target === document.getElementById("addModal")) closeAddModal();
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") {
    if (document.getElementById("playerOverlay").classList.contains("active")) closePlayer();
    else if (document.getElementById("episodeOverlay").classList.contains("active")) closeEpisodes();
    else if (document.getElementById("addModal").classList.contains("active")) closeAddModal();
  }
});

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  updateInstallButton();
});

window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
  updateInstallButton();
  showToast("Приложение установлено");
});

// ═══ Init ═══
updateInstallButton();
loadTorrents();
setInterval(loadTorrents, 30000);
</script>
